<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlCash - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link class="stylesheet" href="frontend/css/style.css">
</head>
<body class="bg-page min-h-screen flex flex-col justify-between">

    <div class="flex-1 flex items-center justify-center p-4">
        <div class="card-login p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6" data-testid="login-title">ControlCash - Login</h2>
            <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">E-mail</label>
                    <input type="email" id="login-email" required data-testid="input-email" class="input-field mt-1 block w-full rounded-md border p-2 text-sm shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Senha</label>
                    <input type="password" id="login-senha" required data-testid="input-password" class="input-field mt-1 block w-full rounded-md border p-2 text-sm shadow-sm">
                </div>
                
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-gray-600 custom-checkbox">
                        <input type="checkbox" id="login-lembrar" data-testid="checkbox-remember" class="mr-2 rounded">
                        Lembrar de mim
                    </label>
                    <a href="#" data-testid="btn-forgot-password" class="text-indigo-600 hover:underline font-medium">Esqueci a senha?</a>
                </div>

                <div id="login-error" data-testid="login-error-message" class="text-red-500 text-sm hidden">Usuário ou senha inválidos.</div>
                
                <button type="submit" data-testid="btn-submit-login" class="btn-primary w-full bg-indigo-600 text-white py-2 px-4 rounded-md transition font-medium text-sm">Entrar</button>
                
                <p class="text-center text-sm text-gray-600 pt-2">
                    Não tem uma conta? 
                    <a href="cadastro.html" data-testid="btn-go-to-register" class="text-indigo-600 hover:underline font-bold">Cadastre-se</a>
                </p>
            </form>
        </div>
    </div>

    <footer class="bg-white text-center py-4 text-xs text-gray-400 border-t border-gray-100">
        Trabalho Final - Teste de Software &copy; 2026
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", checarEmailLembrado);
    </script>
</body>
</html>
